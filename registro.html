<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- presento el formulario de registro. -->
  <!-- muestro el encabezado básico de marca. -->
  <header class="site-header">
    <div class="container header-inner">
      <href="index.html" class="brand-mini"><img src="assets/logo.svg" alt="Logo ClearJP" class="logo"></>
      <div>
        <div class="brand-name">ClearJP</div>
      </div>
    </div>
  </header>

  <!-- centro la tarjeta de creación de cuenta. -->
  <main class="container auth-page">
    <!-- contengo el formulario de registro. -->
    <div class="auth-card">
      <h1>Crear cuenta</h1>
      <form id="registerForm" novalidate>
        <label for="r-name">Nombre completo</label>
        <input id="r-name" type="text" required>

        <label for="r-email">Correo</label>
        <input id="r-email" type="email" required>

        <label for="r-pass">Contraseña</label>
        <input id="r-pass" type="password" required>

        <button type="submit" class="btn primary full">Registrar</button>
        <p id="regMessage" aria-live="polite" class="small"></p>
      </form>
    </div>
  </main>

  <!-- cierro con el footer simple. -->
  <footer class="site-footer">
    <div class="container">
      © <span id="year"></span> ClearJP
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
